<!DOCTYPE html>
<html lang="em">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>3d Tilt Testimonials</title>

        <link rel="stylesheet" href="style.css">
        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    </head>
        <body>
            <section class="testimonials">
                <div class="header">
                    <h1>Testimonials</h1>
                    <p>Move your mouse over cards to see the 3D effect</p>
                </div>
                    <div class="grid">
                        <div class="card tilt">
                            <i class="fa-solid fa-quote-left quote"></i>
                            <p>Has a great learning experience from here.</p>

                            <div class="user">
                                <img src="https://i.pravatar.cc/150?img=12" alt="">
                                <div>
                                    <h3>Sarah Johnson</h3>
                                    <span>UI Designer</span>
                                </div>
                            </div>
                        </div>   

                    
                    <div class="card tilt">
                            <i class="fa-solid fa-quote-left quote"></i>
                            <p>Learning and implementing.</p>

                            <div class="user">
                                <img src="https://i.pravatar.cc/150?img=32" alt="">
                                <div>
                                    <h3>John Carter</h3>
                                    <span>React Dev</span>
                                </div>
                            </div>
                        </div> 


                    <div class="card tilt">
                            <i class="fa-solid fa-quote-left quote"></i>
                            <p>Wonderful experience.</p>

                            <div class="user">
                                <img src="https://i.pravatar.cc/150?img=22" alt="">
                                <div>
                                    <h3>Mike Anderson</h3>
                                    <span>Frontend Dev</span>
                                </div>
                            </div>
                        </div> 
                    </div>
            </section>
            <script src="script.js"></script>
        </body>
    </html>
